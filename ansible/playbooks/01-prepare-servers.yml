---
- name: "[BOOTSTRAP] Prepare servers for Kubernetes"
  hosts: control_plane:workers
  become: true

  tasks:

    - name: "[SWAP] Disable swap"
      command: swapoff -a
      when: ansible_swaptotal_mb > 0

    - name: "[SWAP] Remove swap from /etc/fstab"
      replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
        replace: '# \1'

    - name: "[MODULES] Load kernel modules config"
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    - name: "[MODULES] Load overlay module"
      modprobe:
        name: overlay

    - name: "[MODULES] Load br_netfilter module"
      modprobe:
        name: br_netfilter

    - name: "[SYSCTL] Configure sysctl for Kubernetes"
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1

    - name: "[SYSCTL] Apply sysctl settings"
      command: sysctl --system

    - name: "[UFW] Install UFW"
      apt:
        name: ufw
        state: present
        update_cache: yes
