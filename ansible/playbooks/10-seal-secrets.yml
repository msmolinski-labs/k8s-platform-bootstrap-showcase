---

- name: "[SECRETS] Seal monitoring secrets"
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    secrets_dir: "{{ playbook_dir }}/../../kubernetes/apps/monitoring/base"
    repo_root: "{{ playbook_dir }}/../.."
    env_name_resolved: "{{ env_name | default(ansible_inventory_sources[0] | dirname | basename, true) }}"
    expected_git_branch: "{{ 'main' if env_name_resolved == 'prod' else env_name_resolved }}"

  tasks:

    - name: "[PRE-CHECK] Verify kubeseal is installed"
      command: which kubeseal
      changed_when: false

    - name: "[PRE-CHECK] Wait for Sealed Secrets controller"
      command: >
        kubectl rollout status deployment/sealed-secrets
        -n kube-system --timeout=180s
      changed_when: false

    - name: "[PRE-CHECK] Ensure secrets directory exists"
      file:
        path: "{{ secrets_dir }}"
        state: directory
        mode: '0755'

    - name: "[PRE-CHECK] Require supported environment name"
      fail:
        msg: |
          Unsupported environment derived from inventory: {{ env_name_resolved }}

          Expected inventory path ending with one of:
            - ansible/inventory/dev/hosts.yml
            - ansible/inventory/prod/hosts.yml
      when: env_name_resolved not in ['dev', 'prod']

    - name: "[PRE-CHECK] Get current git branch"
      command: git -C "{{ repo_root }}" rev-parse --abbrev-ref HEAD
      register: current_branch
      changed_when: false

    - name: "[PRE-CHECK] Fail on inventory/branch mismatch"
      fail:
        msg: |
          Inventory/branch mismatch detected.

          Inventory selects environment: {{ env_name_resolved }}
          Current git branch: {{ current_branch.stdout }}
          Expected git branch: {{ expected_git_branch }}

          Switch to the expected branch before re-sealing secrets.
          This prevents committing environment-specific SealedSecrets to the wrong branch.
      when: current_branch.stdout != expected_git_branch

    - name: "[PRE-CHECK] Verify git push access (dry-run)"
      command: git -C "{{ repo_root }}" push --dry-run origin HEAD
      register: git_remote_check
      changed_when: false
      failed_when: false

    - name: "[PRE-CHECK] Fail if cannot push to git remote"
      fail:
        msg: |
          Cannot push to git remote. Sealed Secrets cannot be committed.

          Fix git authentication before running this playbook:

          Option A – GitHub Personal Access Token (HTTPS remote):
            git remote set-url origin https://<YOUR_TOKEN>@github.com/msmolinski-labs/k8s-cluster-bootstrap.git

          Option B – SSH remote:
            git remote set-url origin git@github.com:msmolinski-labs/k8s-cluster-bootstrap.git

          Option C – Git credential helper (HTTPS):
            git config --global credential.helper store

          After fixing, re-run:
            TMP_SECRETS_FILE=$(mktemp)
            sops --decrypt ansible/inventory/{{ env_name_resolved }}/group_vars/all/secrets.sops.yaml > "$TMP_SECRETS_FILE"
            ansible-playbook -i ansible/inventory/{{ env_name_resolved }}/hosts.yml ansible/site.yml \
              --tags seal_secrets -e "env_name={{ env_name_resolved }}" -e @"$TMP_SECRETS_FILE"
            rm -f "$TMP_SECRETS_FILE"
      when: git_remote_check.rc != 0

    - name: "[SEAL] grafana-admin-secret – write temp files"
      copy:
        dest: "{{ item.dest }}"
        mode: '0600'
        content: "{{ item.content }}"
      loop:
        - { dest: /tmp/grafana-admin-user,     content: "{{ grafana_admin_user }}" }
        - { dest: /tmp/grafana-admin-password, content: "{{ grafana_admin_password }}" }

    - name: "[SEAL] grafana-admin-secret – seal from files"
      shell: |
        kubectl create secret generic grafana-admin-secret \
          --from-file=admin-user=/tmp/grafana-admin-user \
          --from-file=admin-password=/tmp/grafana-admin-password \
          --namespace monitoring \
          --dry-run=client -o yaml | \
        kubeseal --format yaml \
          --controller-name sealed-secrets \
          --controller-namespace kube-system \
          > "{{ secrets_dir }}/grafana-sealed-secret.yaml"
      changed_when: true

    - name: "[SEAL] grafana-admin-secret – remove temp files"
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/grafana-admin-user
        - /tmp/grafana-admin-password

    - name: "[SEAL] loki-minio-credentials – write temp files"
      copy:
        dest: "{{ item.dest }}"
        mode: '0600'
        content: "{{ item.content }}"
      loop:
        - { dest: /tmp/loki-access-key-id,     content: "{{ minio_loki_user }}" }
        - { dest: /tmp/loki-access-key-secret, content: "{{ minio_loki_secret_key }}" }

    - name: "[SEAL] loki-minio-credentials – seal from files"
      shell: |
        kubectl create secret generic loki-minio-credentials \
          --from-file=access_key_id=/tmp/loki-access-key-id \
          --from-file=access_key_secret=/tmp/loki-access-key-secret \
          --namespace monitoring \
          --dry-run=client -o yaml | \
        kubeseal --format yaml \
          --controller-name sealed-secrets \
          --controller-namespace kube-system \
          > "{{ secrets_dir }}/loki-minio-sealed-secret.yaml"
      changed_when: true

    - name: "[SEAL] loki-minio-credentials – remove temp files"
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/loki-access-key-id
        - /tmp/loki-access-key-secret

    - name: "[SEAL] alertmanager-config – write to temp file"
      copy:
        dest: /tmp/alertmanager-bootstrap.yaml
        mode: '0600'
        content: |
          global:
            resolve_timeout: 5m
          route:
            group_by: ["alertname", "namespace"]
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 12h
            receiver: "null"
            routes:
              - matchers:
                  - alertname = "Watchdog"
                receiver: "null"
              - matchers:
                  - severity = "critical"
                receiver: slack-critical
          receivers:
            - name: "null"
            - name: slack-critical
              slack_configs:
                - api_url: "{{ alertmanager_slack_webhook }}"
                  channel: "#alerts"
                  send_resolved: true
                  title: >-
                    [{{ '{{' }} .Status | toUpper {{ '}}' }}{{ '{{' }} if eq .Status "firing" {{ '}}' }}:{{ '{{' }} .Alerts.Firing | len {{ '}}' }}{{ '{{' }} end {{ '}}' }}]
                    {{ '{{' }} .CommonLabels.alertname {{ '}}' }}
                  text: >-
                    {{ '{{' }} range .Alerts -{{ '}}' }}
                    *Severity:* {{ '{{' }} .Labels.severity {{ '}}' }}
                    *Namespace:* {{ '{{' }} .Labels.namespace {{ '}}' }}
                    *Description:* {{ '{{' }} .Annotations.description {{ '}}' }}
                    {{ '{{' }} end {{ '}}' }}

    - name: "[SEAL] alertmanager-config – seal from file"
      shell: |
        kubectl create secret generic alertmanager-config \
          --from-file=alertmanager.yaml=/tmp/alertmanager-bootstrap.yaml \
          --namespace monitoring \
          --dry-run=client -o yaml | \
        kubeseal --format yaml \
          --controller-name sealed-secrets \
          --controller-namespace kube-system \
          > "{{ secrets_dir }}/alertmanager-config-sealed-secret.yaml"
      changed_when: true

    - name: "[SEAL] alertmanager-config – remove temp file"
      file:
        path: /tmp/alertmanager-bootstrap.yaml
        state: absent

    - name: "[OK] All secrets sealed"
      debug:
        msg: "All SealedSecrets generated in {{ secrets_dir }}"

    - name: "[GIT] Stage sealed secrets"
      command: git -C "{{ repo_root }}" add "{{ secrets_dir }}"
      changed_when: true

    - name: "[GIT] Check if there are changes to commit"
      command: git -C "{{ repo_root }}" status --porcelain "{{ secrets_dir }}"
      register: git_status
      changed_when: false

    - name: "[GIT] Commit sealed secrets"
      command: >
        git -C "{{ repo_root }}"
        commit -m "chore(secrets): re-seal monitoring secrets [bootstrap]"
      when: git_status.stdout != ""
      changed_when: true

    - name: "[GIT] Get current branch"
      command: git -C "{{ repo_root }}" rev-parse --abbrev-ref HEAD
      register: current_branch
      changed_when: false

    - name: "[GIT] Push to current branch"
      command: git -C "{{ repo_root }}" push origin {{ current_branch.stdout }}
      when: git_status.stdout != ""
      changed_when: true

    - name: "[INFO] No changes to commit"
      debug:
        msg: "SealedSecrets unchanged – skipping git commit."
      when: git_status.stdout == ""

    - name: "[OK] Secrets committed and pushed"
      debug:
        msg: |
          SealedSecrets committed and pushed to {{ current_branch.stdout }}.
          ArgoCD will pick up the new secrets when monitoring-app syncs.
      when: git_status.stdout != ""
