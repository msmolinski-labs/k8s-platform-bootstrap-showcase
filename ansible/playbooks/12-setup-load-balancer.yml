---

- name: "[LB] Setup Nginx Load Balancer"
  hosts: load_balancers
  become: true

  tasks:

    - name: "[PACKAGES] Update apt cache"
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: "[PACKAGES] Install nginx"
      apt:
        name:
          - nginx
        state: present

    - name: "[UFW] Reset UFW to defaults"
      ufw:
        state: reset

    - name: "[UFW] Allow SSH"
      ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: "[UFW] Allow HTTP from Cloudflare IPv4 ranges (proxied)"
      ufw:
        rule: allow
        port: "80"
        proto: tcp
        src: "{{ item }}"
      loop:
        - 173.245.48.0/20
        - 103.21.244.0/22
        - 103.22.200.0/22
        - 103.31.4.0/22
        - 141.101.64.0/18
        - 108.162.192.0/18
        - 190.93.240.0/20
        - 188.114.96.0/20
        - 197.234.240.0/22
        - 198.41.128.0/17
        - 162.158.0.0/15
        - 104.16.0.0/13
        - 104.24.0.0/14
        - 172.64.0.0/13
        - 131.0.72.0/22
      when: cloudflare_proxy_enabled | bool

    - name: "[UFW] Allow HTTP from Cloudflare IPv6 ranges (proxied)"
      ufw:
        rule: allow
        port: "80"
        proto: tcp
        src: "{{ item }}"
      loop:
        - 2400:cb00::/32
        - 2606:4700::/32
        - 2803:f800::/32
        - 2405:b500::/32
        - 2405:8100::/32
        - 2a06:98c0::/29
        - 2c0f:f248::/32
      when: cloudflare_proxy_enabled | bool

    - name: "[UFW] Allow HTTPS from Cloudflare IPv4 ranges (proxied)"
      ufw:
        rule: allow
        port: "443"
        proto: tcp
        src: "{{ item }}"
      loop:
        - 173.245.48.0/20
        - 103.21.244.0/22
        - 103.22.200.0/22
        - 103.31.4.0/22
        - 141.101.64.0/18
        - 108.162.192.0/18
        - 190.93.240.0/20
        - 188.114.96.0/20
        - 197.234.240.0/22
        - 198.41.128.0/17
        - 162.158.0.0/15
        - 104.16.0.0/13
        - 104.24.0.0/14
        - 172.64.0.0/13
        - 131.0.72.0/22
      when: cloudflare_proxy_enabled | bool

    - name: "[UFW] Allow HTTPS from Cloudflare IPv6 ranges (proxied)"
      ufw:
        rule: allow
        port: "443"
        proto: tcp
        src: "{{ item }}"
      loop:
        - 2400:cb00::/32
        - 2606:4700::/32
        - 2803:f800::/32
        - 2405:b500::/32
        - 2405:8100::/32
        - 2a06:98c0::/29
        - 2c0f:f248::/32
      when: cloudflare_proxy_enabled | bool

    - name: "[UFW] Allow HTTP from anywhere (non-proxied)"
      ufw:
        rule: allow
        port: "80"
        proto: tcp
      when: not (cloudflare_proxy_enabled | bool)

    - name: "[UFW] Allow HTTPS from anywhere (non-proxied)"
      ufw:
        rule: allow
        port: "443"
        proto: tcp
      when: not (cloudflare_proxy_enabled | bool)

    - name: "[UFW] Set default outgoing policy to allow"
      ufw:
        direction: outgoing
        policy: allow

    - name: "[UFW] Enable UFW"
      ufw:
        state: enabled
        policy: deny

    - name: "[TLS] Create SSL certificate directory"
      file:
        path: /etc/ssl/cloudflare
        state: directory
        mode: '0700'
        owner: root
        group: root

    - name: "[TLS] Deploy Cloudflare Origin Certificate"
      copy:
        src: "{{ cloudflare_origin_cert_src }}"
        dest: /etc/ssl/cloudflare/origin.pem
        mode: '0600'
        owner: root
        group: root
      notify: Reload nginx

    - name: "[TLS] Deploy Cloudflare Origin Private Key"
      copy:
        src: "{{ cloudflare_origin_key_src }}"
        dest: /etc/ssl/cloudflare/origin.key
        mode: '0600'
        owner: root
        group: root
      notify: Reload nginx

    - name: "[NGINX] Remove default nginx site"
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: "[NGINX] Deploy nginx load balancer config"
      template:
        src: "{{ playbook_dir }}/../templates/nginx-lb.conf.j2"
        dest: /etc/nginx/sites-available/k8s-lb.conf
        mode: '0644'
      notify: Reload nginx

    - name: "[NGINX] Enable nginx site"
      file:
        src: /etc/nginx/sites-available/k8s-lb.conf
        dest: /etc/nginx/sites-enabled/k8s-lb.conf
        state: link

    - name: "[NGINX] Test nginx configuration"
      command: nginx -t
      changed_when: false

    - name: "[NGINX] Ensure nginx is started and enabled"
      systemd:
        name: nginx
        state: started
        enabled: yes

    - name: "[OK] Load balancer ready"
      debug:
        msg: |
          Nginx load balancer configured for {{ base_domain }}

          Upstream workers (ACME HTTP -> {{ nginx_upstream_port }}, app HTTPS -> {{ nginx_upstream_port_ssl }}):
          {% for host in groups['workers'] %}
            {{ host }}: {{ hostvars[host]['ansible_host'] }}:{{ nginx_upstream_port }}/{{ nginx_upstream_port_ssl }}
          {% endfor %}

          SSL: Cloudflare Origin Certificate
          Mode: Full (strict) in Cloudflare dashboard

  handlers:
    - name: "[NGINX] Reload nginx"
      systemd:
        name: nginx
        state: reloaded
