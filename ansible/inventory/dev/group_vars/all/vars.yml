base_domain: "dev-klexify.cloud"
acme_email: "smolak@gmail.com"

lb_ip: "87.106.21.4"
nginx_upstream_port: "30080"
nginx_upstream_port_ssl: "30443"

pod_network_cidr: "10.244.0.0/16"
service_cidr: "10.96.0.0/12"

minio_port: "9000"
minio_loki_user: "loki"
minio_loki_bucket: "loki-dev"
