kubernetes_version: "1.31"
cilium_version: "1.16.6"
argocd_chart_version: "9.4.4"
argocd_namespace: "argocd"

kubeconfig_local: "~/.kube/config"
kubeconfig_remote: "/etc/kubernetes/admin.conf"
bootstrap_manifests_path: "/tmp/k8s-cluster-bootstrap/bootstrap/{{ env_name }}"

github_org: "msmolinski-labs"
github_repo: "k8s-cluster-bootstrap"
github_token: "{{ vault_github_token | default('', true) }}"

minio_root_user: "{{ vault_minio_root_user | default('', true) }}"
minio_root_password: "{{ vault_minio_root_password | default('', true) }}"
minio_loki_secret_key: "{{ vault_minio_loki_secret_key | default('', true) }}"
grafana_admin_user: "{{ vault_grafana_admin_user | default('', true) }}"
grafana_admin_password: "{{ vault_grafana_admin_password | default('', true) }}"
alertmanager_slack_webhook: "{{ vault_alertmanager_slack_webhook | default('', true) }}"
