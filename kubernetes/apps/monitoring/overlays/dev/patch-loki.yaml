apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  source:
    helm:
      values: |
        deploymentMode: SingleBinary

        chunksCache:
          enabled: false

        resultsCache:
          enabled: false

        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: s3
            bucketNames:
              chunks: loki-dev
              ruler: loki-dev
              admin: loki-dev
            s3:
              endpoint: http://87.106.90.193:9000
              region: us-east-1
              accessKeyId: loki
              secretAccessKey: ${LOKI_S3_SECRET_KEY}
              s3ForcePathStyle: true
              insecure: true
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h

        singleBinary:
          replicas: 1
          extraArgs:
            - -config.expand-env=true
          extraEnv:
            - name: LOKI_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: loki-minio-credentials
                  key: access_key_secret

        read:
          replicas: 0
        write:
          replicas: 0
        backend:
          replicas: 0

        gateway:
          enabled: false
        lokiCanary:
          enabled: false
        test:
          enabled: false
