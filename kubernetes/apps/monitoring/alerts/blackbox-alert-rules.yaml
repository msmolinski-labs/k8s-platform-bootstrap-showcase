apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: blackbox-alerts
  namespace: monitoring
  labels:
    release: prometheus-stack
spec:
  groups:
    - name: blackbox
      rules:
        - alert: EndpointDown
          expr: probe_success{job="probe/monitoring/http-endpoints"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Endpoint {{ $labels.instance }} jest niedostępny"
            description: "{{ $labels.instance }} nie odpowiada od ponad 2 minut."

        - alert: SSLCertExpiringSoon
          expr: probe_ssl_earliest_cert_expiry{job="probe/monitoring/http-endpoints"} - time() < 86400 * 14
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Certyfikat SSL wygasa wkrótce dla {{ $labels.instance }}"
            description: "Certyfikat SSL dla {{ $labels.instance }} wygasa za mniej niż 14 dni."
