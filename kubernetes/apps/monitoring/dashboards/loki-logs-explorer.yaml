apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-logs-explorer
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  loki-logs-explorer.json: |-
    {
      "title": "Loki / Logs Explorer",
      "uid": "loki-logs-explorer",
      "tags": ["loki", "logs"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "10s",
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "loki", "uid": "loki" },
            "query": "label_values(namespace)",
            "refresh": 2,
            "includeAll": true,
            "allValue": ".+",
            "multi": false,
            "label": "Namespace"
          },
          {
            "name": "pod",
            "type": "query",
            "datasource": { "type": "loki", "uid": "loki" },
            "query": "label_values({namespace=~\"$namespace\"}, pod)",
            "refresh": 2,
            "includeAll": true,
            "allValue": ".+",
            "multi": false,
            "label": "Pod"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "logs",
          "title": "Logs",
          "gridPos": { "h": 24, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "{namespace=~\"$namespace\", pod=~\"$pod\"}",
              "refId": "A"
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          }
        }
      ]
    }