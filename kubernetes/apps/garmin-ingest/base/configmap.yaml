apiVersion: v1
kind: ConfigMap
metadata:
  name: garmin-ingest-config
  namespace: garmin-ingest
data:
  GARMIN_DATA_ROOT: "/data"
  GARMIN_INBOX_DIR: "/data/inbox"
  GARMIN_ARCHIVE_ZIPS_DIR: "/data/archive/zips"
  GARMIN_ARCHIVE_FITS_DIR: "/data/archive/fits"
  GARMIN_EXTRACTED_DIR: "/data/extracted"
  GARMIN_FAILED_DIR: "/data/failed"
  GARMIN_DUPLICATES_DIR: "/data/duplicates"
  GARMIN_LOGS_DIR: "/data/logs"
  WRITE_AUTH_SESSION_BACKEND: redis
  WRITE_AUTH_SESSION_TTL_SECONDS: "43200"
  WRITE_AUTH_REDIS_PREFIX: "garmin:write-auth:sessions:"
  REDIS_URL: "redis://redis.garmin-ingest.svc:6379/0"
