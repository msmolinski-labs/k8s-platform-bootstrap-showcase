apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: garmin-ingest
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: garmin-ingest
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: garmin-ingest
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garmin-ingest
        app.kubernetes.io/component: worker
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 600
      containers:
        - name: worker
          image: ghcr.io/msmolinski-labs/garmin-ingest:latest
          command:
            - python
            - -m
            - importer.app.account_upload_worker_main
            - --poll-interval-seconds
            - "1.0"
            - --status-port
            - "9091"
          ports:
            - containerPort: 9091
              name: status
          envFrom:
            - configMapRef:
                name: garmin-ingest-config
            - secretRef:
                name: garmin-ingest-db-credentials
          volumeMounts:
            - name: garmin-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: garmin-data
          persistentVolumeClaim:
            claimName: garmin-data
