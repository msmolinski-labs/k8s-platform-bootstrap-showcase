apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: garmin-ingest
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: garmin-ingest
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: garmin-ingest
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garmin-ingest
        app.kubernetes.io/component: api
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: ghcr.io/msmolinski-labs/garmin-ingest:latest
          command: ["python", "-m", "importer.app.api_server_main", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: garmin-ingest-config
            - secretRef:
                name: garmin-ingest-db-credentials
            - secretRef:
                name: garmin-ingest-auth-credentials
          volumeMounts:
            - name: garmin-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: garmin-data
          persistentVolumeClaim:
            claimName: garmin-data
